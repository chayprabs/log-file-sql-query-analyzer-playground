name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify WASM assets
        run: ls public/sql-wasm.wasm public/sql-wasm-browser.wasm

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: License check
        run: npx license-checker --production --failOn "GPL;AGPL;LGPL" --excludePackages "@img/sharp-libvips-linux-x64;@img/sharp-libvips-linuxmusl-x64"

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Unit tests
        run: npm test

      - name: Next.js static export
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npm run test:e2e
